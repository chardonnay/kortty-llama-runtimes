name: Build and publish signed runtime

on:
  workflow_dispatch:
    inputs:
      source_commit:
        description: "Reviewed full commit SHA from chardonnay/korTTY"
        required: true
        type: string
      promotion_reason:
        description: "Reason for stable promotion"
        required: true
        type: choice
        options: [initial, regular, security, model-support]
        default: regular
      revoked_runtime_ids:
        description: "Optional comma/newline-separated runtime or installation IDs to revoke"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: publish-kortty-llama-runtime
  cancel-in-progress: false

jobs:
  validate-source:
    runs-on: ubuntu-latest
    steps:
      - name: Require an immutable source commit
        shell: bash
        env:
          SOURCE_COMMIT: ${{ inputs.source_commit }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$SOURCE_COMMIT" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "source_commit must be a full lowercase Git commit SHA."
            exit 1
          fi
      - name: Verify that the commit exists in the canonical repository
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
        run: |
          set -euo pipefail
          resolved="$(gh api "repos/chardonnay/korTTY/commits/$SOURCE_COMMIT" --jq .sha)"
          test "$resolved" = "$SOURCE_COMMIT" \
            || { echo "The requested commit does not exist in chardonnay/korTTY."; exit 1; }

  build-runtime:
    needs: validate-source
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: aarch64
            backend: CPU
          - os: macos-latest
            platform: macos
            arch: aarch64
            backend: METAL
          - os: macos-15-intel
            platform: macos
            arch: x86_64
            backend: CPU
          - os: macos-15-intel
            platform: macos
            arch: x86_64
            backend: METAL
          - os: windows-latest
            platform: windows
            arch: x86_64
            backend: CPU
          - os: windows-latest
            platform: windows
            arch: x86_64
            backend: VULKAN
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            backend: CPU
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            backend: VULKAN
          - os: ubuntu-24.04-arm
            platform: linux
            arch: aarch64
            backend: CPU
          - os: ubuntu-24.04-arm
            platform: linux
            arch: aarch64
            backend: VULKAN
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - name: Checkout reviewed korTTY source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: chardonnay/korTTY
          ref: ${{ inputs.source_commit }}
          persist-credentials: false

      - name: Verify checked-out source identity
        shell: bash
        env:
          SOURCE_COMMIT: ${{ inputs.source_commit }}
        run: test "$(git rev-parse HEAD)" = "$SOURCE_COMMIT"

      - name: Set up JDK 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Install native build dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libvulkan-dev glslc spirv-headers spirv-tools mesa-vulkan-drivers curl jq

      - name: Install native build dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: brew install cmake ninja jq

      - name: Install native build dependencies (Windows)
        if: runner.os == 'Windows' && matrix.backend == 'VULKAN'
        shell: pwsh
        run: |
          choco install cmake ninja vulkan-sdk jq -y --no-progress
          $vulkanSdk = [Environment]::GetEnvironmentVariable("VULKAN_SDK", "Machine")
          if ([string]::IsNullOrWhiteSpace($vulkanSdk)) {
            $vulkanSdk = Get-ChildItem 'C:\VulkanSDK' -Directory | Sort-Object Name | Select-Object -Last 1 -ExpandProperty FullName
          }
          if (-not (Test-Path "$vulkanSdk\Bin\glslc.exe")) {
            throw "Vulkan SDK installation is incomplete: $vulkanSdk"
          }
          "VULKAN_SDK=$vulkanSdk" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$vulkanSdk\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Materialize short Windows build path
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path C:\k) { cmd /c rmdir C:\k }
          New-Item -ItemType Directory -Path C:\k | Out-Null
          robocopy $env:GITHUB_WORKSPACE C:\k /E /XD .git build .gradle
          if ($LASTEXITCODE -gt 7) { throw "robocopy failed with exit code $LASTEXITCODE" }
          $global:LASTEXITCODE = 0

      - name: Build verified runtime package and descriptor
        shell: bash
        run: |
          if [ "$RUNNER_OS" = Windows ]; then cd /c/k; fi
          ./gradlew generateLlamaRuntimeManifest -Pllama.backend=${{ matrix.backend }} --stacktrace

      - name: Native link smoke
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = Windows ]; then cd /c/k; fi
          server="$(find build -type f \( -name llama-server -o -name llama-server.exe \) | head -n1)"
          test -n "$server"
          "$server" --version

      - name: Authenticated API, sleep/wake and parallel-sidecar smoke
        shell: bash
        env:
          KORTTY_RUNTIME_BACKEND: ${{ matrix.backend }}
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = Windows ]; then cd /c/k; fi
          chat_model=build/llama-runtime/SmolLM2-135M-Instruct-Q2_K.gguf
          embedding_model=build/llama-runtime/stories260K.gguf
          curl --fail --location --retry 3 \
            'https://huggingface.co/bartowski/SmolLM2-135M-Instruct-GGUF/resolve/09816acd5d99df7be770d85ea30822623dab342c/SmolLM2-135M-Instruct-Q2_K.gguf?download=true' \
            -o "$chat_model"
          curl --fail --location --retry 3 \
            'https://huggingface.co/ggml-org/models/resolve/main/tinyllamas/stories260K.gguf?download=true' \
            -o "$embedding_model"
          if command -v sha256sum >/dev/null 2>&1; then
            chat_sha="$(sha256sum "$chat_model" | awk '{print $1}')"
            embedding_sha="$(sha256sum "$embedding_model" | awk '{print $1}')"
          else
            chat_sha="$(shasum -a 256 "$chat_model" | awk '{print $1}')"
            embedding_sha="$(shasum -a 256 "$embedding_model" | awk '{print $1}')"
          fi
          test "$chat_sha" = '741ad12b64088fedc17c33aacb22e48be1972ef36a39f03666dd68bd15614fb9'
          test "$embedding_sha" = '270cba1bd5109f42d03350f60406024560464db173c0e387d91f0426d3bd256d'
          server="$(find build/llama-runtime/stage-* -type f \( -name llama-server -o -name llama-server.exe \) | head -n1)"
          test -n "$server"
          key='kortty-ci-runtime-key'
          gpu_layers=0
          if [ "$KORTTY_RUNTIME_BACKEND" != CPU ]; then
            gpu_layers=1
          fi
          cleanup() {
            for pid in $(jobs -p); do
              kill "$pid" >/dev/null 2>&1 || true
            done
          }
          trap cleanup EXIT

          "$server" --host 127.0.0.1 --port 18080 --model "$chat_model" --api-key "$key" \
            --offline --no-ui --no-agent --no-ui-mcp-proxy --no-slots --n-gpu-layers "$gpu_layers" \
            --sleep-idle-seconds 1 >build/llama-runtime/server-chat.log 2>&1 &
          for _ in $(seq 1 120); do
            curl --silent --fail http://127.0.0.1:18080/health >/dev/null && break
            sleep 1
          done
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --header 'Content-Type: application/json' --data '{"prompt":"blocked","max_tokens":1}' \
            http://127.0.0.1:18080/v1/completions)" = 401
          curl --fail --header "Authorization: Bearer $key" \
            http://127.0.0.1:18080/v1/models | jq -e '.data | length > 0'
          curl --fail --header "Authorization: Bearer $key" --header 'Content-Type: application/json' \
            --data '{"prompt":"Once","max_tokens":1}' \
            http://127.0.0.1:18080/v1/completions | jq -e '.choices | length == 1'
          sleep 2
          curl --fail --header "Authorization: Bearer $key" --header 'Content-Type: application/json' \
            --data '{"prompt":"Wake","max_tokens":1}' \
            http://127.0.0.1:18080/v1/completions | jq -e '.choices | length == 1'
          curl --fail --header "Authorization: Bearer $key" --header 'Content-Type: application/json' \
            --data '{"messages":[{"role":"user","content":"Return whether korTTY is local."}],"max_tokens":16,"response_format":{"type":"json_schema","schema":{"type":"object","properties":{"local":{"type":"boolean"}},"required":["local"],"additionalProperties":false}}}' \
            http://127.0.0.1:18080/v1/chat/completions | jq -e '.choices | length == 1'

          "$server" --host 127.0.0.1 --port 18081 --model "$embedding_model" --api-key "$key" \
            --offline --no-ui --no-agent --no-ui-mcp-proxy --no-slots --n-gpu-layers "$gpu_layers" \
            --embedding --pooling mean >build/llama-runtime/server-embedding.log 2>&1 &
          for _ in $(seq 1 120); do
            curl --silent --fail http://127.0.0.1:18081/health >/dev/null && break
            sleep 1
          done
          curl --fail --header "Authorization: Bearer $key" --header 'Content-Type: application/json' \
            --data '{"input":"korTTY"}' \
            http://127.0.0.1:18081/v1/embeddings | jq -e '.data[0].embedding | length > 0'
          curl --fail --header "Authorization: Bearer $key" --header 'Content-Type: application/json' \
            --data '{"prompt":"Still alive","max_tokens":1}' \
            http://127.0.0.1:18080/v1/completions | jq -e '.choices | length == 1'

      - name: Upload immutable package candidate
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: llama-runtime-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.backend }}
          path: build/llama-runtime/packages/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload immutable Windows package candidate
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: llama-runtime-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.backend }}
          path: C:/k/build/llama-runtime/packages/*
          if-no-files-found: error
          retention-days: 14

  qdrant-integration:
    needs: validate-source
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      qdrant:
        image: qdrant/qdrant:v1.18.2
        ports:
          - 6333:6333
    steps:
      - name: Checkout reviewed korTTY source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: chardonnay/korTTY
          ref: ${{ inputs.source_commit }}
          persist-credentials: false
      - name: Set up JDK 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "25"
      - name: Install build dependencies
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y maven curl
      - name: Wait for pinned Qdrant
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            if curl --silent --fail http://127.0.0.1:6333/readyz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Pinned Qdrant service did not become ready."
          exit 1
      - name: Run real Qdrant vector-store contract
        env:
          KORTTY_TEST_QDRANT_URL: http://127.0.0.1:6333
        run: ./gradlew test --tests de.kortty.rag.QdrantVectorStoreIntegrationTest --stacktrace

  publish-stable:
    needs: [build-runtime, qdrant-integration]
    runs-on: ubuntu-latest
    environment: llama-runtime-signing
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      SIGNING_KEY: ${{ secrets.LLAMA_RUNTIME_ED25519_PRIVATE_KEY_PEM }}
      EXPECTED_PUBLIC_KEY: ${{ vars.LLAMA_RUNTIME_ED25519_PUBLIC_KEY_PEM }}
      PROMOTION_REASON: ${{ inputs.promotion_reason }}
      REVOKED_RUNTIME_IDS: ${{ inputs.revoked_runtime_ids }}
      SOURCE_COMMIT: ${{ inputs.source_commit }}
    steps:
      - name: Download reviewed runtime matrix
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: llama-runtime-*
          path: runtime-assets
          merge-multiple: true

      - name: Enforce stable cadence
        shell: bash
        run: |
          set -euo pipefail
          latest_created="$(gh release view --json createdAt --jq .createdAt 2>/dev/null || true)"
          if [ -z "$latest_created" ]; then
            test "$PROMOTION_REASON" = initial \
              || { echo "The first release must use promotion reason 'initial'."; exit 1; }
            audit_note="Initial human-dispatched stable promotion."
          else
            test "$PROMOTION_REASON" != initial \
              || { echo "'initial' is valid only when no stable release exists."; exit 1; }
            latest_epoch="$(date -u -d "$latest_created" +%s)"
            now_epoch="$(date -u +%s)"
            age_seconds="$((now_epoch - latest_epoch))"
            if [ "$PROMOTION_REASON" = regular ] && [ "$age_seconds" -lt 604800 ]; then
              echo "Regular promotion denied: the latest stable release is under seven days old."
              exit 1
            fi
            if [ "$PROMOTION_REASON" = regular ]; then
              audit_note="Regular seven-day stable cadence gate satisfied."
            else
              audit_note="Human-dispatched cadence override: ${PROMOTION_REASON}."
            fi
          fi
          echo "PROMOTION_AUDIT_NOTE=$audit_note" >> "$GITHUB_ENV"

      - name: Verify packages and build signed cumulative index
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SIGNING_KEY"
          test -n "$EXPECTED_PUBLIC_KEY"
          descriptors=(runtime-assets/*.json)
          packages=(runtime-assets/*.zip)
          test "${#descriptors[@]}" = 10
          test "${#packages[@]}" = 10
          runtime_id="$(jq -r '.runtimeId' "${descriptors[@]}" | sort -u)"
          test "$(printf '%s\n' "$runtime_id" | wc -l)" = 1
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${runtime_id}"
          for descriptor in "${descriptors[@]}"; do
            archive_name="$(jq -r '.downloadUrl | split("/")[-1]' "$descriptor")"
            archive="runtime-assets/$archive_name"
            test -f "$archive"
            expected="$(jq -r .sha256 "$descriptor")"
            actual="$(sha256sum "$archive" | awk '{print $1}')"
            test "$actual" = "$expected"
            jq --arg base "$release_url" '.downloadUrl = ($base + "/" + (.downloadUrl | split("/")[-1]))' \
              "$descriptor" >"$descriptor.tmp"
            mv "$descriptor.tmp" "$descriptor"
          done

          mkdir -p runtime-assets/previous
          printf '%s' '{"schemaVersion":1,"generatedAt":"1970-01-01T00:00:00Z","revokedRuntimeIds":[],"packages":[]}' \
            >runtime-assets/previous/runtime-index-v1.json
          printf '%s' "$SIGNING_KEY" >runtime-assets/signing-key.pem
          chmod 600 runtime-assets/signing-key.pem
          printf '%s\n' "$EXPECTED_PUBLIC_KEY" >runtime-assets/expected-signing-public-key.pem
          openssl pkey -in runtime-assets/signing-key.pem -pubout \
            >runtime-assets/actual-signing-public-key.pem
          cmp -s runtime-assets/expected-signing-public-key.pem \
            runtime-assets/actual-signing-public-key.pem \
            || { echo "The signing secret does not match the pinned public verification key."; exit 1; }
          if latest_tag="$(gh release view --json tagName --jq .tagName 2>/dev/null)" && [ -n "$latest_tag" ]; then
            gh release download "$latest_tag" \
              --pattern runtime-index-v1.json --pattern runtime-index-v1.sig \
              --dir runtime-assets/previous --clobber
            base64 --decode runtime-assets/previous/runtime-index-v1.sig \
              >runtime-assets/previous/runtime-index-v1.sig.raw
            openssl pkey -in runtime-assets/signing-key.pem -pubout \
              >runtime-assets/previous/signing-public-key.pem
            openssl pkeyutl -verify -pubin \
              -inkey runtime-assets/previous/signing-public-key.pem -rawin \
              -in runtime-assets/previous/runtime-index-v1.json \
              -sigfile runtime-assets/previous/runtime-index-v1.sig.raw
          fi

          printf '%s' "$REVOKED_RUNTIME_IDS" | tr ',\r' '\n\n' \
            | sed -E 's/^[[:space:]]+|[[:space:]]+$//g' | sed '/^$/d' | sort -u \
            >runtime-assets/requested-revocations.txt
          if grep -Ev '^[A-Za-z0-9._-]+$' runtime-assets/requested-revocations.txt; then
            echo "Revoked runtime IDs contain invalid characters."
            exit 1
          fi
          jq -R -s 'split("\n") | map(select(length > 0))' \
            runtime-assets/requested-revocations.txt >runtime-assets/requested-revocations.json
          jq -s '.' "${descriptors[@]}" >runtime-assets/new-packages.json
          jq -s '((.[0].packages // []) + .[1])' \
            runtime-assets/previous/runtime-index-v1.json runtime-assets/new-packages.json \
            >runtime-assets/all-packages.json
          jq -e 'group_by(.runtimeId + "|" + .platform + "|" + .architecture + "|" + .backend)
            | all(.[]; (map(.sha256) | unique | length) == 1)' runtime-assets/all-packages.json >/dev/null
          jq -n \
            --slurpfile previous runtime-assets/previous/runtime-index-v1.json \
            --slurpfile packages runtime-assets/all-packages.json \
            --slurpfile requested runtime-assets/requested-revocations.json \
            '{schemaVersion: 1,
              generatedAt: (now | todateiso8601),
              revokedRuntimeIds: (((($previous[0].revokedRuntimeIds // []) + $requested[0]) | unique | sort)),
              packages: (($packages[0] | unique_by(.runtimeId + "|" + .platform + "|" + .architecture + "|" + .backend) | sort_by(.runtimeId, .platform, .architecture, .backend)))}' \
            >runtime-assets/runtime-index-v1.json
          openssl pkeyutl -sign -rawin -inkey runtime-assets/signing-key.pem \
            -in runtime-assets/runtime-index-v1.json -out runtime-assets/runtime-index-v1.sig.raw
          base64 -w0 runtime-assets/runtime-index-v1.sig.raw >runtime-assets/runtime-index-v1.sig
          rm -rf runtime-assets/signing-key.pem runtime-assets/runtime-index-v1.sig.raw \
            runtime-assets/expected-signing-public-key.pem runtime-assets/actual-signing-public-key.pem \
            runtime-assets/previous runtime-assets/requested-revocations.txt \
            runtime-assets/requested-revocations.json runtime-assets/new-packages.json \
            runtime-assets/all-packages.json
          echo "RUNTIME_ID=$runtime_id" >> "$GITHUB_ENV"

      - name: Publish immutable stable assets
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RUNTIME_ID" >/dev/null 2>&1; then
            echo "Stable runtime $RUNTIME_ID already exists and will not be overwritten."
            exit 1
          fi
          gh release create "$RUNTIME_ID" runtime-assets/*.zip \
            runtime-assets/runtime-index-v1.json runtime-assets/runtime-index-v1.sig \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RUNTIME_ID" \
            --target main \
            --notes "Human-promoted stable korTTY llama.cpp runtime matrix built from korTTY commit ${SOURCE_COMMIT}. Promotion reason: ${PROMOTION_REASON}. ${PROMOTION_AUDIT_NOTE}"
